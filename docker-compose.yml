services:
  app:
    build: .
    expose:
      - "8000"
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mark36.rule=PathPrefix(`/`)"
      - "traefik.http.routers.mark36.entrypoints=web"
      - "traefik.http.services.mark36.loadbalancer.server.port=8000"
      - "traefik.http.routers.mark36.middlewares=rate-limit@file,ip-allowlist@file"
      # health check — Traefik won't route to a replica until this passes
      - "traefik.http.services.mark36.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.mark36.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.mark36.loadbalancer.healthcheck.timeout=3s"

  mongo:
    image: mongo:7.0
    container_name: mark36-mongo
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gateway

  redis:
    image: redis:7.2-alpine
    container_name: mark36-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gateway

volumes:
  mongo_data:
  redis_data:

networks:
  gateway:
    external: true